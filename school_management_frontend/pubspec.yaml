name: school_management_frontend
description: A beautiful Flutter app for school management system with clean architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  bloc: ^8.1.4

  # Navigation
  go_router: ^13.0.0

  # HTTP Client
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0


  # UI Components
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  lottie: ^2.7.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.0
  logger: ^2.1.0
  flutter_dotenv: ^5.1.0

  # Form Validation
  validators: ^3.0.0

  # Image Picker
  image_picker: ^1.0.4
  permission_handler: ^11.4.0

  # PDF and file handling
  file_picker: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

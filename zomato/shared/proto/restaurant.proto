syntax = "proto3";

package pb;

option go_package = "github.com/vikashkp9030/zomato/shared/pb";

// Restaurant Service Messages
message Restaurant {
  string id = 1;
  string owner_id = 2;
  string name = 3;
  string address = 4;
  string city = 5;
  double latitude = 6;
  double longitude = 7;
  float average_rating = 8;
  int32 total_reviews = 9;
  string status = 10;
  int64 created_at = 11;
}

message Category {
  string id = 1;
  string restaurant_id = 2;
  string name = 3;
  string description = 4;
}

message Dish {
  string id = 1;
  string restaurant_id = 2;
  string category_id = 3;
  string name = 4;
  float price = 5;
  bool is_veg = 6;
  bool is_available = 7;
}

message CreateRestaurantRequest {
  string owner_id = 1;
  string name = 2;
  string address = 3;
  string city = 4;
  double latitude = 5;
  double longitude = 6;
}

message CreateRestaurantResponse {
  Restaurant restaurant = 1;
}

message GetRestaurantRequest {
  string restaurant_id = 1;
}

message GetRestaurantResponse {
  Restaurant restaurant = 1;
}

message SearchRestaurantsRequest {
  string query = 1;
  string city = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message SearchRestaurantsResponse {
  repeated Restaurant restaurants = 1;
  int32 total = 2;
}

// Restaurant Service RPC
service RestaurantService {
  rpc CreateRestaurant(CreateRestaurantRequest) returns (CreateRestaurantResponse);
  rpc GetRestaurant(GetRestaurantRequest) returns (GetRestaurantResponse);
  rpc SearchRestaurants(SearchRestaurantsRequest) returns (SearchRestaurantsResponse);
}
